<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add your details</title>
    <link rel="stylesheet" href="./styling/reset.css">
    <link rel="stylesheet" href="./styling/create-account.css">
</head>

<body>
    <main class="flex">
        <div class="registration flex">
            <a href="./registration.html" class="back-link flex">
                <span><svg class="MuiSvgIcon-root MuiSvgIcon-fontSizeMedium mui-y0i997" focusable="false" aria-hidden="true" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                        <path d="M15.031 4.47a.75.75 0 0 1 0 1.06L8.561 12l6.47 6.47a.75.75 0 1 1-1.06 1.06L6.44 12l7.53-7.53a.75.75 0 0 1 1.061 0" clip-rule="evenodd" fill-rule="evenodd"></path>
                    </svg></span>
                <span>Back</span>
            </a>
            <h1>Add your details</h1>
            <form class="flex">
                <div class="field flex">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="name-fields flex">
                    <div class="field flex">
                        <label for="first-name">First name</label>
                        <input type="text" id="first-name" required>
                    </div>
                    <div class="field flex">
                        <label for="last-name">Last name</label>
                        <input type="text" id="last-name" required>
                    </div>
                </div>
                <div class="field flex">
                    <label for="password">Create password</label>
                    <div class="password-wrap flex">
                        <input type="password" id="password" required>
                    </div>
                </div>
                <div class="field flex">
                    <div class="label flex">
                        <label for="display-name">Display Name</label>
                        <span class="char-count" style="color: white;">14/16</span>
                    </div>
                    <div class="display-name-wrap flex">
                        <input type="text" id="display-name" value="manthisprojecttakesawhile123" required>
                    </div>
                </div>
                <label class="checkboxes flex">
                    <input type="checkbox">
                    <span>Send news, surveys, and offers from Epic Games <span class="optional">(Optional)</span></span>
                </label>
                <button type="submit" class="continue-btn">Continue</button>
            </form>

            <a href="#" class="privacy-link">Privacy Policy</a>
        </div>
    </main>
</body>

</html>
